# Dev-server compose: all services internal (PG, Redis, API, Importer, Nginx).
# Start: docker compose --env-file .env.dev -f docker-compose.dev.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: yyddp-postgres
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yyddp_dev}
      POSTGRES_USER: ${POSTGRES_USER:-yyddp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yyddp} -d ${POSTGRES_DB:-yyddp_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - yyddp-net

  redis:
    image: redis:7-alpine
    container_name: yyddp-redis
    env_file:
      - .env.dev
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-devpassword}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yyddp-net

  yyddp-api:
    build:
      context: ./yyddp-api
      dockerfile: Dockerfile.dev
    container_name: yyddp-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      PORT: 8888
      API_VERSION: 1.0.0-dev
      DATABASE_URL: postgresql://${POSTGRES_USER:-yyddp}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-yyddp_dev}
      # Redis — code reads REDIS_URL first, falls back to individual vars
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      # Auth
      JWT_SECRET: ${JWT_SECRET:?required}
      ALIYUN_SMS_DISABLED: "true"
      MOCK_PHONEOTP: "123456"
      ALIYUN_SMS_SIGN: ${ALIYUN_SMS_SIGN:-北京自成长教育科技}
      ALIYUN_SMS_TEMPLATE: ${ALIYUN_SMS_TEMPLATE:-SMS_504055089}
      # Unlock engine
      UNLOCK_TZ: ${UNLOCK_TZ:-Asia/Shanghai}
      UNLOCK_HOUR: ${UNLOCK_HOUR:-10}
      UNLOCK_BYPASS: ${UNLOCK_BYPASS:-true}
      # OSS
      OSS_ENDPOINT: https://yyddp-1228786748647400.oss-cn-beijing.oss-accesspoint.aliyuncs.com/
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:?required}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:?required}
      OSS_BUCKET: ailanguages
      OSS_DIRECTORY: /videos
      OSS_ARN: acs:oss:cn-beijing:1228786748647400:accesspoint/yyddp/object/*
    command: ["nodemon", "src/server.js"]
    ports:
      - "8888:8888"
    volumes:
      - ./yyddp-api:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - yyddp-net

  yyddp-importer:
    build:
      context: ./yyddp-importer
      dockerfile: Dockerfile.dev
    container_name: yyddp-importer
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-yyddp}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-yyddp_dev}
      oss_region: oss-cn-beijing
      key: ${OSS_IMPORTER_KEY:?required}
      secret: ${OSS_IMPORTER_SECRET:?required}
      SQLITE_OSS_PREFIX: videos/sqlite/
      SQLITE_INPUT_PATH: /app/input.sqlite
      VITE_BASE: /admin/
    command: ["pnpm", "run", "preview"]
    ports:
      - "3001:3001"
      - "5173:5173"
    volumes:
      - ./yyddp-importer:/app
      - /app/node_modules
      - /app/preview/node_modules
    networks:
      - yyddp-net

  nginx:
    image: nginx:1.27-alpine
    container_name: yyddp-nginx
    depends_on:
      - yyddp-api
      - yyddp-importer
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - yyddp-net

networks:
  yyddp-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:

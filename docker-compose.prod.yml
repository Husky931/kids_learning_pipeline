# Prod-server compose: PG + Redis are external Aliyun managed services.
# Only runs Node.js apps + Nginx. DB connections come from .env.prod.
# Start: docker compose --env-file .env.prod -f docker-compose.prod.yml up --build -d

services:
  yyddp-api:
    build:
      context: ./yyddp-api
      dockerfile: Dockerfile
    container_name: yyddp-api
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 8888
      API_VERSION: 1.0.0
      # External Aliyun PG — connection string from .env.prod
      DATABASE_URL: ${DATABASE_URL:?required}
      # External Aliyun Redis — connection string from .env.prod
      REDIS_URL: ${REDIS_URL:?required}
      # Auth
      JWT_SECRET: ${JWT_SECRET:?required}
      ALIYUN_SMS_DISABLED: "false"
      SMS_ACCESS_KEY_ID: ${SMS_ACCESS_KEY_ID:?required}
      SMS_ACCESS_KEY_SECRET: ${SMS_ACCESS_KEY_SECRET:?required}
      ALIYUN_SMS_SIGN: ${ALIYUN_SMS_SIGN:-北京自成长教育科技}
      ALIYUN_SMS_TEMPLATE: ${ALIYUN_SMS_TEMPLATE:-SMS_504055089}
      # Unlock engine
      UNLOCK_TZ: ${UNLOCK_TZ:-Asia/Shanghai}
      UNLOCK_HOUR: ${UNLOCK_HOUR:-10}
      UNLOCK_BYPASS: "false"
      # OSS
      OSS_ENDPOINT: ${OSS_ENDPOINT:?required}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:?required}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:?required}
      OSS_BUCKET: ailanguages
      OSS_DIRECTORY: /videos
      OSS_ARN: ${OSS_ARN:-acs:oss:cn-beijing:1228786748647400:accesspoint/yyddp/object/*}
    expose:
      - "8888"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - yyddp-net
    restart: unless-stopped

  yyddp-importer:
    build:
      context: ./yyddp-importer
      dockerfile: Dockerfile
    container_name: yyddp-importer
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      oss_region: ${OSS_REGION:-oss-cn-beijing}
      key: ${OSS_IMPORTER_KEY:?required}
      secret: ${OSS_IMPORTER_SECRET:?required}
      SQLITE_OSS_PREFIX: videos/sqlite/
      SQLITE_INPUT_PATH: /app/input.sqlite
      VITE_BASE: /admin/
    expose:
      - "3001"
      - "5173"
    networks:
      - yyddp-net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: yyddp-nginx
    depends_on:
      - yyddp-api
      - yyddp-importer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot-webroot:/var/www/certbot:ro
    networks:
      - yyddp-net
    restart: unless-stopped

networks:
  yyddp-net:
    driver: bridge

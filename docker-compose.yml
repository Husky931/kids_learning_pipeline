services:
  postgres:
    image: postgres:16-alpine
    container_name: yyddp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yyddp_dev}
      POSTGRES_USER: ${POSTGRES_USER:-yyddp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yyddp} -d ${POSTGRES_DB:-yyddp_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - yyddp-net

  redis:
    image: redis:7-alpine
    container_name: yyddp-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-devpassword}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yyddp-net

  yyddp-api:
    build:
      context: ./yyddp-api
      dockerfile: Dockerfile
    container_name: yyddp-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8888
      API_VERSION: 1.0.0-dev
      POSTGRESQL_IP: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USER: ${POSTGRES_USER:-yyddp}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRESQL_COURSE_DATABASE: ${POSTGRES_DB:-yyddp_dev}
      POSTGRESQL_USER_DATABASE: ${POSTGRES_DB:-yyddp_dev}
      DATABASE_URL: postgresql://${POSTGRES_USER:-yyddp}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-yyddp_dev}
      REDIS_IP: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      MOCK_JWTTOKEN: ${JWT_SECRET:-dev-only-jwt-secret-change-in-prod}
      OSS_ENDPOINT: https://yyddp-1228786748647400.oss-cn-beijing.oss-accesspoint.aliyuncs.com/
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-your-oss-access-key-id}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-your-oss-access-key-secret}
      OSS_BUCKET: ailanguages
      OSS_DIRECTORY: /videos
      OSS_ARN: acs:oss:cn-beijing:1228786748647400:accesspoint/yyddp/object/*
    expose:
      - "8888"
    networks:
      - yyddp-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  yyddp-importer:
    build:
      context: ./yyddp-importer
      dockerfile: Dockerfile
    container_name: yyddp-importer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-yyddp}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-yyddp_dev}
      oss_region: oss-cn-beijing
      key: ${OSS_IMPORTER_KEY:-your-oss-importer-key}
      secret: ${OSS_IMPORTER_SECRET:-your-oss-importer-secret}
      SQLITE_OSS_PREFIX: videos/sqlite/
      SQLITE_INPUT_PATH: /app/input.sqlite
      VITE_BASE: /admin/
    expose:
      - "3001"
      - "5173"
    networks:
      - yyddp-net

  nginx:
    image: nginx:1.27-alpine
    container_name: yyddp-nginx
    depends_on:
      - yyddp-api
      - yyddp-importer
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - yyddp-net

networks:
  yyddp-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:

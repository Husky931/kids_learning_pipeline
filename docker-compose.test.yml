# Test-only Redis on port 6380 — isolated from dev Redis so FLUSHALL is safe.
# Start: docker compose -f docker-compose.test.yml up -d

services:
  redis-test:
    image: redis:7-alpine
    container_name: yyddp-redis-test
    command: ["redis-server", "--requirepass", "testpassword", "--appendonly", "no"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpassword", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

upstream yyddp_api {
    server yyddp-api:8888;
}

upstream yyddp_importer_web {
    server yyddp-importer:5173;
}

upstream yyddp_importer_api {
    server yyddp-importer:3001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    location /api/v1/ {
        proxy_pass http://yyddp_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /download {
        proxy_pass http://yyddp_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /admin/api/ {
        proxy_pass http://yyddp_importer_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /admin/download/ {
        proxy_pass http://yyddp_importer_api/download/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://yyddp_importer_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = / {
        return 200 "yyddp stack up\ntry /api/v1/health or /admin/\n";
        add_header Content-Type text/plain;
    }
}
